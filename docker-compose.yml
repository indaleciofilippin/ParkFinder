version: '3.8'

services:
  backend:
    build: ./backend
    container_name: parkfinder_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    networks:
      - parkfinder_net

  frontend:
    build: ./frontend
    container_name: parkfinder_frontend
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=${MY_LOCAL_IP}
    stdin_open: true
    tty: true
    networks:
      - parkfinder_net

networks:
  parkfinder_net:
    driver: bridge
