<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script type="module" src="https://unpkg.com/rebill@latest/dist/rebill/rebill.esm.js"></script>
  <script nomodule src="https://unpkg.com/rebill@latest/dist/rebill/rebill.js"></script>
  <style>
    body { background: #333; padding: 20px; font-family: sans-serif; color: white; }
    #fallback { display: none; }
  </style>
</head>
<body>
  <h2>Rebill Web Component Test</h2>
  <rebill-save-card 
    processing-country="AR" 
    public-key="pk_6abbb605fa104702aee3cd3b04899836">
  </rebill-save-card>
  
  <p id="msg"></p>

  <script>
    const card = document.querySelector('rebill-save-card');
    if (card) {
      card.addEventListener('success', (e) => {
        document.getElementById('msg').innerText = "SUCCESS: " + JSON.stringify(e.detail);
      });
      card.addEventListener('error', (e) => {
        document.getElementById('msg').innerText = "ERROR: " + JSON.stringify(e.detail);
      });
    }
  </script>
</body>
</html>
